services:
  # Backend Web Service
  - type: web
    name: project-management-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: project-management-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 1h
      - key: BCRYPT_SALT
        value: "10"
      - key: CLIENT_URL
        value: https://project-management-portal-71cw.onrender.com

  # Frontend Static Site
  - type: web
    name: project-management-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: project-management-backend
          type: web
          property: host

databases:
  - name: project-management-db
    plan: free
    databaseName: project_portal
    user: postgres
